name: Stock Signal Update & Deploy

on:
  # schedule 비활성화 — PM2 스케줄러(run-today-signal.mjs)가 동일 작업을 수행하므로 중복 방지
  # schedule:
  #   - cron: '0,30 0-6 * * 1-5'
  #   - cron: '10 7 * * 1-5'
  push:
    branches:
      - master
  workflow_dispatch: # 수동 실행 허용

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore KIS token cache
        uses: actions/cache/restore@v4
        with:
          path: .kis_token_cache.json
          key: kis-token-${{ github.run_id }}
          restore-keys: kis-token-

      - name: Collect stock signal data
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        run: npm run data:update

      - name: Save KIS token cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .kis_token_cache.json
          key: kis-token-${{ github.run_id }}

      - name: Commit updated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin master
          git add public/data/today_signal.json
          git diff --staged --quiet && exit 0
          git commit -m "data: update stock signals [skip ci]"
          git push

      - name: Build static site
        run: npm run build

      - name: Deploy to Cafe24 via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.CAFE24_FTP_HOST }}
          username: ${{ secrets.CAFE24_FTP_USER }}
          password: ${{ secrets.CAFE24_FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /www/todaysignal/
          exclude: |
            **/.git*
            **/.git*/**
