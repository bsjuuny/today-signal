name: Stock Signal Update & Deploy

on:
  schedule:
    # 장 마감 후 16:10 KST = 07:10 UTC, 평일(월~금)
    - cron: '10 7 * * 1-5'
  push:
    branches:
      - master
  workflow_dispatch: # 수동 실행 허용

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Collect stock signal data
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
        run: npm run data:update

      - name: Commit updated data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin master
          git add public/data/today_signal.json
          git diff --staged --quiet && exit 0
          git commit -m "data: update stock signals [skip ci]"
          git push

      - name: Build static site
        run: npm run build

      - name: Deploy to Cafe24 via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CAFE24_FTP_HOST }}
          username: ${{ secrets.CAFE24_FTP_USER }}
          password: ${{ secrets.CAFE24_FTP_PASSWORD }}
          local-dir: ./out/
          server-dir: /www/todaysignal/
          exclude: |
            **/.git*
            **/.git*/**
